name: Cucumber BDD Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '45 15 * * *'  # Runs at 9:15 PM IST (3:45 PM UTC) daily

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke tests
        run: npm run test:smoke
        env:
          HEADLESS: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-node${{ matrix.node-version }}
          path: reports/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-node${{ matrix.node-version }}
          path: screenshots/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-node${{ matrix.node-version }}
          path: logs/

  report-summary:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report-node20
          path: reports/

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs-node20
          path: logs/
        continue-on-error: true

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🥒 Cucumber BDD Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Result** | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f reports/cucumber-report.json ]; then
            SCENARIOS=$(cat reports/cucumber-report.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          total=passed=failed=0
          for f in data:
            for s in f.get('elements',[]):
              if s.get('type')=='scenario':
                total+=1
                steps=s.get('steps',[])
                if any(st['result']['status']=='failed' for st in steps):
                  failed+=1
                else:
                  passed+=1
          print(f'{total}|{passed}|{failed}')
          " 2>/dev/null || echo "0|0|0")
            TOTAL=$(echo $SCENARIOS | cut -d'|' -f1)
            PASSED=$(echo $SCENARIOS | cut -d'|' -f2)
            FAILED=$(echo $SCENARIOS | cut -d'|' -f3)
            echo "### 📊 Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Scenarios | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f logs/test-execution.log ]; then
            echo "### 📝 Execution Log (last 30 lines)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -30 logs/test-execution.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download full HTML report from the Artifacts section below**" >> $GITHUB_STEP_SUMMARY
