name: Cucumber BDD Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '45 15 * * *'  # Runs at 9:15 PM IST (3:45 PM UTC) daily

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke tests
        run: npm run test:smoke
        env:
          HEADLESS: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-node${{ matrix.node-version }}
          path: reports/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-node${{ matrix.node-version }}
          path: screenshots/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-node${{ matrix.node-version }}
          path: logs/

  report-summary:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report-node20
          path: reports/

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs-node20
          path: logs/
        continue-on-error: true

      - name: Generate test summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'HEADER'
          # 🥒 Cucumber BDD Test Report

          ## 📋 Pipeline Details

          HEADER

          echo "| | Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔀 | **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 | **Triggered by** | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏁 | **Overall Result** | **${{ needs.test.result == 'success' && '✅ PASSED' || '❌ FAILED' }}** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 | **Run** | [View Full Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f reports/cucumber-report.json ]; then
            python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json

          with open('reports/cucumber-report.json') as f:
              data = json.load(f)

          total = passed = failed = 0
          total_steps = passed_steps = failed_steps = skipped_steps = 0
          scenario_details = []

          for feature in data:
              feature_name = feature.get('name', 'Unknown')
              for element in feature.get('elements', []):
                  if element.get('type') == 'scenario':
                      total += 1
                      name = element.get('name', 'Unknown')
                      steps = element.get('steps', [])
                      step_count = len(steps)
                      failed_in_scenario = False
                      duration_ns = 0
                      for step in steps:
                          result = step.get('result', {})
                          status = result.get('status', 'undefined')
                          duration_ns += result.get('duration', 0)
                          total_steps += 1
                          if status == 'passed':
                              passed_steps += 1
                          elif status == 'failed':
                              failed_steps += 1
                              failed_in_scenario = True
                          else:
                              skipped_steps += 1
                      duration_s = duration_ns / 1e9
                      if failed_in_scenario:
                          failed += 1
                          icon = '❌'
                      else:
                          passed += 1
                          icon = '✅'
                      scenario_details.append((icon, feature_name, name, step_count, f'{duration_s:.1f}s'))

          pass_rate = (passed / total * 100) if total > 0 else 0

          print('## 📊 Test Results\n')
          print('| | Metric | Count |')
          print('|---|--------|-------|')
          print(f'| 📋 | **Total Scenarios** | **{total}** |')
          print(f'| ✅ | **Passed** | **{passed}** |')
          print(f'| ❌ | **Failed** | **{failed}** |')
          print(f'| 📈 | **Pass Rate** | **{pass_rate:.0f}%** |')
          print()
          print('| | Metric | Count |')
          print('|---|--------|-------|')
          print(f'| 🔢 | Total Steps | {total_steps} |')
          print(f'| ✅ | Passed Steps | {passed_steps} |')
          print(f'| ❌ | Failed Steps | {failed_steps} |')
          print(f'| ⏭️ | Skipped Steps | {skipped_steps} |')
          print()
          print('## 🎯 Scenario Details\n')
          print('| Status | Feature | Scenario | Steps | Duration |')
          print('|--------|---------|----------|-------|----------|')
          for icon, feat, name, steps, dur in scenario_details:
              print(f'| {icon} | {feat} | {name} | {steps} | {dur} |')
          print()
          PYEOF
          fi

          if [ -f logs/test-execution.log ]; then
            echo "## 📝 Execution Log (last 20 lines)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```log' >> $GITHUB_STEP_SUMMARY
            tail -20 logs/test-execution.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download the full HTML report from the Artifacts section at the bottom of this page.**" >> $GITHUB_STEP_SUMMARY
