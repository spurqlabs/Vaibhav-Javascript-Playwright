name: Cucumber BDD Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Smoke tests
        run: npm run test:smoke
        env:
          HEADLESS: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-node${{ matrix.node-version }}
          path: reports/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-node${{ matrix.node-version }}
          path: screenshots/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-node${{ matrix.node-version }}
          path: logs/

  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download report from Node 20 run
        uses: actions/download-artifact@v4
        with:
          name: cucumber-report-node20
          path: report/

      - name: Download screenshots (if any)
        uses: actions/download-artifact@v4
        with:
          name: failure-screenshots-node20
          path: report/screenshots/
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
